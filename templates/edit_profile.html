<!DOCTYPE html>
<html>
<head>

<title>Edit Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:linear-gradient(135deg,#0f172a,#2563eb,#0ea5e9);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

}

.card{

width:650px;

padding:40px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(20px);

border-radius:20px;

color:white;

box-shadow:0 20px 40px rgba(0,0,0,.3);

}

h1{

text-align:center;

margin-bottom:30px;

}

label{

display:block;

margin-top:18px;

font-weight:bold;

}

input{

width:100%;

padding:12px;

margin-top:8px;

border:none;

border-radius:10px;

font-size:16px;

}

.buttons{

margin-top:35px;

display:flex;

justify-content:space-between;

}

button{

padding:14px 35px;

border:none;

border-radius:10px;

background:#2563eb;

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

}

button:hover{

background:#1d4ed8;

}

a{

text-decoration:none;

background:#ef4444;

padding:14px 35px;

border-radius:10px;

color:white;

font-weight:bold;

}

a:hover{

background:#dc2626;

}

</style>

</head>

<body>

<div class="card">

<h1>Edit Profile</h1>

<form method="POST" enctype="multipart/form-data">

<label>Name</label>

<input
type="text"
name="name"
value="{{ user['name'] }}"
required>

<label>Email</label>

<input
type="email"
name="email"
value="{{ user['email'] }}"
required>

<label>Mobile</label>

<input
type="text"
name="mobile"
value="{{ user['mobile'] }}"
required>

<label>Age</label>

<input
type="number"
name="age"
value="{{ user['age'] }}"
required>

<label>Profile Picture</label>

<input
type="file"
name="profile_picture"
accept="image/*">

<div class="buttons">

<button type="submit">

💾 Save Changes

</button>

<a href="/profile">

Cancel

</a>

</div>

</form>

</div>

</body>

</html>
