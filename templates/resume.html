<!DOCTYPE html>
<html>

<head>

<title>Resume Analyzer</title>

<style>

body{
    margin:0;
    font-family:Poppins,sans-serif;

    background-image:url("/static/resume_background.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

.overlay{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:rgba(10,20,40,.35);

}

.container{

width:85%;

max-width:1000px;

padding:40px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.2);

border-radius:25px;

box-shadow:0 15px 45px rgba(0,0,0,.45);

color:white;

}

button{

padding:12px 25px;

background:#2563eb;

color:white;

border:none;

border-radius:8px;

cursor:pointer;

}

button:hover{

background:#1d4ed8;

}

</style>

</head>

<body>

<div class="overlay">

<div class="container">

<h1>📄 AI Resume Analyzer</h1>

<form method="POST" enctype="multipart/form-data">

<input
type="file"
name="resume"
accept=".pdf"
required>

<br><br>

<button type="submit">

Analyze Resume

</button>

</form>

{% if score %}

<hr>

<h2>Resume Score : {{ score }}/100</h2>

<h3>Skills Detected</h3>

<hr>

<h2>🤖 Gemini AI Resume Review</h2>

<pre
style="
text-align:left;
white-space:pre-wrap;
font-size:16px;
background:rgba(255,255,255,.15);
color:white;
padding:20px;
border-radius:12px;
">

{{ ai_report }}

</pre>

<ul>

{% for skill in skills %}

<li>{{ skill }}</li>

{% endfor %}

</ul>

{% endif %}

</div>

</div>

</body>

</html>
