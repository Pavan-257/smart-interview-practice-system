<!DOCTYPE html>
<html>
<head>

<title>Reset Password</title>

<style>

body{

font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.box{

width:450px;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 0 15px lightgray;

}

input{

width:100%;
padding:12px;
margin-top:20px;
font-size:16px;

}

button{

width:100%;
margin-top:20px;
padding:12px;
background:#007bff;
color:white;
border:none;
border-radius:8px;

}

</style>

</head>

<body>

<div class="box">

<h2>Reset Password</h2>

<form method="POST">

<input
type="text"
name="otp"
placeholder="Enter OTP"
required>

<input
type="password"
name="password"
placeholder="New Password"
required>

<input
type="password"
name="confirm"
placeholder="Confirm Password"
required>

<button>

Update Password

</button>

</form>

</div>

</body>

</html>
