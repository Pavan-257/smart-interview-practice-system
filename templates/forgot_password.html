<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{

            width:450px;
            background:white;
            padding:40px;
            border-radius:12px;
            box-shadow:0 0 15px lightgray;

        }

        h2{

            text-align:center;
            color:#007bff;

        }

        input{

            width:100%;
            padding:12px;
            margin-top:20px;
            font-size:16px;

        }

        button{

            width:100%;
            margin-top:20px;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;

        }

    </style>

</head>

<body>

<div class="box">

<h2>Forgot Password</h2>

<form method="POST">

<input
type="email"
name="email"
placeholder="Enter Registered Email"
required>

<button type="submit">

Send OTP

</button>

</form>

</div>

</body>

</html>
