<!DOCTYPE html>
<html>
<head>
    <title>Aptitude Interview</title>

    <style>
        body{
    margin:0;
    padding:0;
    font-family:'Segoe UI',Arial,sans-serif;

    background-image:url("/static/aptitude_background.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

.overlay{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(20,15,40,.20);
    backdrop-filter:blur(.5px);
}

.box{
    width:85%;
    max-width:900px;
    padding:45px;
    border-radius:25px;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.25);
    box-shadow:0 15px 50px rgba(0,0,0,.45);
    color:white;
}

h2{
    font-size:40px;
    color:white;
}

h3{
    color:#ffd54f;
}

p{
    font-size:24px;
    font-weight:bold;
}

textarea{
    width:100%;
    height:190px;
    padding:18px;
    margin-top:20px;
    font-size:18px;
    border:none;
    border-radius:15px;
    resize:none;
    outline:none;
    background:white;
    box-sizing:border-box;
}

button{
    margin-top:25px;
    padding:15px 40px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#ff9800,#ffca28);
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(255,193,7,.45);
}
    </style>

</head>

<body>

<div class="overlay">

<div class="box">

<h2>Aptitude Interview</h2>

<h3>Question {{ number }}</h3>

<p><b>{{ question }}</b></p>

<form method="POST">

<textarea
name="answer"
placeholder="Enter your answer..."
required></textarea>

<br>

{% if number == total %}

<button type="submit">
Submit Interview
</button>

{% else %}

<button type="submit">
Next Question
</button>

{% endif %}

</form>

</div>

</div>

</body>

</html>
