<!DOCTYPE html>
<html>
<head>
    <title>Smart Interview Result</title>

    <style>

        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f4f7fb;
        }

        .container{
            width:90%;
            max-width:1000px;
            margin:40px auto;
        }

        .header{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:25px;
            border-radius:15px;
        }

        .score-card{
            width:250px;
            margin:30px auto;
            background:white;
            text-align:center;
            padding:25px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.15);
        }

        .score-card h2{
            color:#198754;
            font-size:32px;
            margin:10px 0;
        }

        .feedback{
            margin-top:30px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.15);
            line-height:1.8;
            font-size:16px;
        }

        .feedback h2{
            color:#0d6efd;
            border-bottom:2px solid #ddd;
            padding-bottom:8px;
        }

        .feedback h3{
            color:#198754;
            margin-top:25px;
        }

        .feedback strong{
            color:#000;
        }

        .feedback ul{
            margin-left:20px;
        }

        .btn{
            display:inline-block;
            margin-top:30px;
            padding:14px 30px;
            background:#0d6efd;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-size:18px;
        }

        .btn:hover{
            background:#084298;
        }

        .center{
            text-align:center;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="header">
        <h1>Smart Interview Practice System</h1>
        <h2>AI Interview Report</h2>
    </div>

    <div class="score-card">
        <h3>Status</h3>
        <h2>{{ score }}</h2>
    </div>

    <div class="feedback">
        {{ feedback|safe }}
    </div>

    <div class="center">

    <a href="/download-report" class="btn">
        📄 Download PDF Report
    </a>

    <br><br>

    <a href="/interview" class="btn">
        Back to Dashboard
    </a>

</div>

</div>

</body>
</html>
