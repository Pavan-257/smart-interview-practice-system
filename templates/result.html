<!DOCTYPE html>
<html>
<head>
    <title>Interview Result</title>

    <style>

        body{
            margin:0;
            padding:40px;
            background:#f4f6fb;
            font-family:Arial,sans-serif;
        }

        .container{
            width:85%;
            margin:auto;
            background:white;
            border-radius:12px;
            padding:40px;
            box-shadow:0 5px 20px rgba(0,0,0,.15);
        }

        h1{
            text-align:center;
            color:#0b5ed7;
        }

        .score{
            text-align:center;
            font-size:45px;
            font-weight:bold;
            color:#198754;
            margin:30px;
        }

        .feedback{
            line-height:1.8;
            font-size:17px;
            white-space:pre-wrap;
        }

        .buttons{
            text-align:center;
            margin-top:40px;
        }

        a{
            text-decoration:none;
            padding:14px 28px;
            border-radius:8px;
            color:white;
            margin:10px;
            display:inline-block;
        }

        .pdf{
            background:#dc3545;
        }

        .home{
            background:#0d6efd;
        }

    </style>
</head>

<body>

<div class="container">

<h1>Interview Evaluation Report</h1>

<div class="score">
Score : {{ score }}/100
</div>

<div class="feedback">
{{ feedback | safe }}
</div>

<div class="buttons">

<a class="pdf"
href="{{ url_for('download_report', filename=filename) }}">
Download PDF
</a>

<a class="home"
href="/dashboard">
Back to Dashboard
</a>

</div>

</div>

</body>
</html>
