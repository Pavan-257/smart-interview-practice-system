<!DOCTYPE html>
<html>
<head>
    <title>Smart Interview System - Login</title>

    <style>
        body{

        margin:0;

        font-family:"Poppins",sans-serif;

        background-image:url("/static/login_background.png");

        background-size:cover;

        background-position:center;

        background-repeat:no-repeat;

        background-attachment:fixed;

        min-height:100vh;

        display:flex;

        justify-content:center;

        align-items:center;

        }

        .overlay{

        width:100%;

        min-height:100vh;

        display:flex;

        justify-content:flex-end;

        align-items:center;

        padding-right:3%;

        background:rgba(10,20,40,.30);

        }

        .container{

        width:420px;

        padding:40px;

        border-radius:25px;

        background:rgba(255,255,255,.15);

        backdrop-filter:blur(18px);
 
        border:1px solid rgba(255,255,255,.2);

        box-shadow:0 20px 45px rgba(0,0,0,.35);

        color:white;

        opacity:0;

        transform:translateY(60px) scale(.95);

        animation:loginAppear 2s ease forwards;

        }
        
        .left{

        width:100%;

        padding:0;

        }

        .left h1{

        color:white;

        font-size:42px;

        margin-bottom:35px;

        text-align:left;

        }

        .input-box{

        width:100%;

        padding:15px;

        margin-top:8px;

        margin-bottom:22px;

        border:none;

        border-radius:10px;

        font-size:16px;

        background:rgba(255,255,255,.90);

        }

        label{

        display:block;

        text-align:left;

        margin-bottom:8px;

        margin-top:15px;

        font-size:17px;

        font-weight:600;

        color:white;

        }

        .btn{

        width:100%;

        padding:15px;

        font-size:18px;

        font-weight:bold;
 
        background:linear-gradient(135deg,#2563eb,#38bdf8);

        border:none;

        border-radius:12px;

        cursor:pointer;

        transition:.35s;

        }

        .btn:hover{

        transform:translateY(-3px);

        box-shadow:0 15px 30px rgba(0,0,0,.30);

        }

        .register-link{
            text-align:center;
            margin-top:20px;
        }

        .register-link a{
            text-decoration:none;
            color:#007bff;
            font-weight:bold;
        }


    @keyframes loginAppear{

    0%{

    opacity:0;

    transform:translateY(60px) scale(.95);

    }

    60%{

    opacity:1;

    transform:translateY(-8px) scale(1.02);

    }

    100%{

    opacity:1;

    transform:translateY(0) scale(1);

    }

    }

    </style>
</head>

<body>

<div class="overlay">

<div class="container">

    <div class="left" style="padding-right:60px;">

        <h1>Login</h1>

        <form method="POST">

    <label>Email</label>
    <input type="text"
       name="email"
       class="input-box"
       placeholder="Enter Email">

    <label>Password</label>
    <input type="password"
       name="password"
       class="input-box"
       placeholder="Enter Password">

    <div style="text-align:right; margin-bottom:15px;">
        <a href="/forgot-password">
        Forgot Password?
        </a>
    </div>

    <button type="submit" class="btn">
        Login
    </button>

</form>

        <div class="register-link">
            <a href="/register">Create New Account</a>
        </div>

    </div>

</div>

</div>

</body>
</html>
