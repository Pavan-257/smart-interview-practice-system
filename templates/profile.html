<!DOCTYPE html>
<html>

<head>

    <title>My Profile</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:linear-gradient(135deg,#0f172a,#2563eb,#0ea5e9);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

.profile{

width:700px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(18px);

padding:40px;

border-radius:20px;

color:white;

box-shadow:0 20px 40px rgba(0,0,0,.3);

}

.profile img{

width:140px;

height:140px;

border-radius:50%;

display:block;

margin:auto;

border:5px solid white;

}

.profile h1{

text-align:center;

margin:20px;

}

.info{

margin-top:30px;

}

.row{

display:flex;

justify-content:space-between;

padding:15px;

border-bottom:1px solid rgba(255,255,255,.2);

font-size:18px;

}

.buttons{

margin-top:35px;

display:flex;

justify-content:space-around;

}

.btn{

padding:12px 25px;

background:#2563eb;

color:white;

text-decoration:none;

border-radius:10px;

font-weight:bold;

}

.btn:hover{

background:#1d4ed8;

}

</style>

</head>

<body>

<div class="profile">

<img
src="{{ url_for('static', filename='profile_pictures/' + user['profile_picture']) }}"
style="
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
border:5px solid white;
">

<h1>{{ user["name"] }}</h1>

<div class="info">

<div class="row">
<span>Email</span>
<span>{{ user["email"] }}</span>
</div>

<div class="row">
<span>Mobile</span>
<span>{{ user["mobile"] }}</span>
</div>

<div class="row">
<span>Age</span>
<span>{{ user["age"] }}</span>
</div>

<div class="row">
<span>Username</span>
<span>{{ user["username"] }}</span>
</div>

</div>

<div class="buttons">

<a href="/dashboard" class="btn">
Dashboard
</a>

<a href="/edit-profile" class="btn">
Edit Profile
</a>

</div>

</div>

</body>

</html>
