<!DOCTYPE html>
<html>
<head>
    <title>Email Verification</title>

    <style>
        body{
            font-family:Arial;
            background:#f4f6f9;
        }

        .container{
            width:450px;
            margin:100px auto;
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0 0 10px lightgray;
            text-align:center;
        }

        input{
            width:90%;
            padding:12px;
            margin:15px 0;
            font-size:18px;
        }

        button{
            padding:12px 30px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0056b3;
        }
    </style>

</head>

<body>

<div class="container">

<h2>Email Verification</h2>

<p>Enter the OTP sent to your email.</p>

<form method="POST">

<input
type="text"
name="otp"
placeholder="Enter 6-digit OTP"
required>

<br>

<button type="submit">
Verify OTP
</button>

</form>

</div>

</body>
</html>
